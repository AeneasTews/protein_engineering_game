<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="MutateIt — an interactive protein engineering game. Explore how mutations affect protein fitness using real deep mutational scanning data.">

  <!-- OpenGraph / social sharing -->
  <meta property="og:title" content="MutateIt — Protein Engineering Game">
  <meta property="og:description" content="An interactive game where you engineer proteins by introducing mutations and predicting their effect on fitness. Built on real deep mutational scanning data.">
  <meta property="og:image" content="https://mutateit.biocentral.cloud/favicon.png">
  <meta property="og:url" content="https://mutateit.biocentral.cloud">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="MutateIt">

  <!-- Twitter card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="MutateIt — Protein Engineering Game">
  <meta name="twitter:description" content="An interactive game where you engineer proteins by introducing mutations and predicting their effect on fitness.">
  <meta name="twitter:image" content="https://mutateit.biocentral.cloud/favicon.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="MutateIt">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>MutateIt — Protein Engineering Game</title>
  <link rel="manifest" href="manifest.json">

  <!-- Molstar -->
  <link rel="stylesheet" href="molstar.css"/>
  <script src="scripts/molstar.js"></script>
  <script src="scripts/molstar_bootstrap.js"></script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
