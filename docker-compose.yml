services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-*}"
    volumes:
      - ./backend/dms_data:/app/dms_data:ro
      - db-data:/data
      - ./backend/logs:/app/logs

  frontend:
    build:
      context: ./app
      args:
        API_BASE_URL: "${API_BASE_URL:-http://localhost:8000}"
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db-data:
